# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.DOMAIN.com.br DOMAIN.com.br;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Painel Admin (React SPA) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.DOMAIN.com.br;

    ssl_certificate     /etc/letsencrypt/live/admin.DOMAIN.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.DOMAIN.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy → container web (React)
    location / {
        proxy_pass         http://web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy → API Go (rotas /api/*)
    location /api/ {
        proxy_pass         http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Upload de arquivos
        client_max_body_size 50M;
        proxy_read_timeout   120s;
    }
}
