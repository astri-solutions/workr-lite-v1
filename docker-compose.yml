version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: workr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workrlite}
      POSTGRES_USER: ${POSTGRES_USER:-workr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - workr_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workr} -d ${POSTGRES_DB:-workrlite}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: workr_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-workr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-workrlite}?sslmode=disable

      # App
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      APP_SECRET: ${APP_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://admin.workrlite.com}

      # Email (Postmark)
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-noreply@workrlite.com}
      POSTMARK_FROM_NAME: ${POSTMARK_FROM_NAME:-Workr Lite}

      # Storage (uploads — S3-compatible or local)
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_PATH: /app/uploads
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}

      # CVM integration
      CVM_API_BASE_URL: ${CVM_API_BASE_URL:-https://dados.cvm.gov.br/api/dados/}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - workr_net

  # ── React Admin (Nginx) ───────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile
    container_name: workr_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"
    networks:
      - workr_net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    container_name: workr_proxy
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - workr_net

  # ── Certbot (SSL) ─────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: workr_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  certbot_data:
  certbot_www:

networks:
  workr_net:
    driver: bridge
